name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets --locked

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install libevent (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - name: Install libevent (macOS)
        if: runner.os == 'macOS'
        run: brew install libevent
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --no-fail-fast

  # fmt / clippy are advisory (continue-on-error) and are NOT in the
  # release-build `needs:` — only real-bug signals (check, test, doc) block the
  # pipeline. The port is seeded from a transpile that carries lint noise which
  # is cleaned as modules are ported; matching the sibling repos, we surface it
  # without failing CI on it.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --locked -- -D warnings

  doc:
    name: Doc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --locked

  # Parity vs system tmux: run the same inputs through the real tmux and ztmux
  # and diff byte-for-byte. Advisory (continue-on-error, not in release-build
  # `needs:`) while the port's server surface is still coming up — it surfaces
  # the pass rate and uploads the failure log without failing the pipeline.
  # Flip to blocking once the suite is reliably green (see parity/PARITY_ROADMAP.md).
  parity:
    name: Parity vs system tmux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y libevent-dev tmux
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Compare ztmux output to tmux on parity/cases
        run: bash parity/run_parity.sh --summary --json parity/parity_summary.json
        env:
          ZTMUX: ${{ github.workspace }}/target/release/ztmux
      - name: Upload parity failure log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: parity-failures
          path: parity/parity_failures.log
          if-no-files-found: ignore

  release-build:
    name: Release Build
    needs: [check, test, doc]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # x86_64 on the Intel runner: macos-latest is arm64, and Homebrew's
          # libevent there is arm64-only, so a cross x86_64 link fails.
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - name: Install libevent (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libevent-dev
      - name: Install libevent (macOS)
        if: runner.os == 'macOS'
        run: brew install libevent
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v6
        with:
          name: ztmux-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ztmux
